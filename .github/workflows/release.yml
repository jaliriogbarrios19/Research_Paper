name: Build and attest release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag (no v prefix)
        if: startsWith(github.ref_name, 'v')
        run: |
          echo "::error::Tag '${{ github.ref_name }}' has a 'v' prefix. Obsidian requires tags without 'v' (e.g. 0.6.0 not v0.6.0). Use: git tag 0.6.0"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css

      - name: Normalize tag (strip v prefix)
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          CLEAN="${TAG#v}"
          echo "version=${CLEAN}" >> $GITHUB_OUTPUT

      - name: Create release and upload assets
        run: |
          gh release create ${{ steps.tag.outputs.version }} \
            --title "Research and Paper ${{ steps.tag.outputs.version }}" \
            --generate-notes \
            main.js manifest.json styles.css versions.json
        env:
          GH_TOKEN: ${{ github.token }}
